name: Build zh-CN Packages

on:
    workflow_dispatch:
        inputs:
            upload_release:
                description: "Upload built packages to a GitHub Release"
                required: false
                type: boolean
                default: false
            release_tag:
                description: "Release tag to upload to when running manually"
                required: false
                type: string
            source_run_id:
                description: "Optional completed workflow run ID to upload artifacts from without rebuilding"
                required: false
                type: string
    push:
        tags:
            - "v*-zhcn.*"

permissions:
    actions: read
    contents: write

env:
    GO_VERSION: "1.25.6"
    NODE_VERSION: 22
    NODE_OPTIONS: --max-old-space-size=4096

jobs:
    build:
        name: Build ${{ matrix.name }}
        runs-on: ${{ matrix.runner }}
        if: github.event_name != 'workflow_dispatch' || inputs.source_run_id == ''
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: macOS arm64 DMG
                      runner: macos-latest
                      artifact_name: macos-arm64-dmg
                      artifact_path: make/*.dmg
                    - name: Windows x64 installer
                      runner: windows-latest
                      artifact_name: windows-x64
                      artifact_path: |
                          make/*.exe
                          make/*.msi
                          make/*.zip

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: go.sum

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Force git dependencies to HTTPS
              run: |
                  git config --global url.https://github.com/.insteadof ssh://git@github.com/
                  git config --global url.https://github.com/.insteadof git@github.com:
              shell: bash

            - name: Install npm dependencies
              run: npm ci --no-audit --no-fund

            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Zig on Windows
              if: runner.os == 'Windows'
              uses: mlugg/setup-zig@v2

            - name: Build macOS package
              if: runner.os == 'macOS'
              run: task package -- --mac dmg --arm64
              shell: bash
              env:
                  USE_SYSTEM_FPM: true
                  CSC_IDENTITY_AUTO_DISCOVERY: false

            - name: Build Windows package
              if: runner.os == 'Windows'
              run: task package
              shell: powershell
              env:
                  USE_SYSTEM_FPM: true
                  CSC_IDENTITY_AUTO_DISCOVERY: false

            - name: Upload package artifact
              uses: actions/upload-artifact@v5
              with:
                  name: ${{ matrix.artifact_name }}
                  path: ${{ matrix.artifact_path }}
                  if-no-files-found: error

    release:
        name: Upload packages to Release
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release && inputs.source_run_id == '')
        steps:
            - name: Download package artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Resolve release tag
              id: release_tag
              run: |
                  if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                      tag="${GITHUB_REF_NAME}"
                  else
                      tag="${{ inputs.release_tag }}"
                  fi
                  if [[ -z "${tag}" ]]; then
                      echo "release_tag is required when upload_release is enabled manually" >&2
                      exit 1
                  fi
                  echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              shell: bash

            - name: Create or update GitHub Release
              run: |
                  set -euo pipefail
                  tag="${{ steps.release_tag.outputs.tag }}"
                  if ! gh release view "${tag}" >/dev/null 2>&1; then
                      gh release create "${tag}" \
                          --title "Wave 简体中文增强版 ${tag}" \
                          --notes "自动构建的 macOS arm64 和 Windows x64 安装包。" \
                          --target "${GITHUB_SHA}"
                  fi
                  mapfile -t files < <(find release-artifacts -type f | sort)
                  if [[ ${#files[@]} -eq 0 ]]; then
                      echo "No release artifacts found" >&2
                      exit 1
                  fi
                  gh release upload "${tag}" "${files[@]}" --clobber
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}

    upload-existing-release:
        name: Upload existing artifacts to Release
        runs-on: ubuntu-latest
        if: github.event_name == 'workflow_dispatch' && inputs.upload_release && inputs.source_run_id != ''
        steps:
            - name: Download package artifacts from source run
              uses: actions/download-artifact@v4
              with:
                  github-token: ${{ github.token }}
                  repository: ${{ github.repository }}
                  run-id: ${{ inputs.source_run_id }}
                  path: release-artifacts

            - name: Resolve release tag
              id: release_tag
              run: |
                  tag="${{ inputs.release_tag }}"
                  if [[ -z "${tag}" ]]; then
                      echo "release_tag is required when upload_release is enabled manually" >&2
                      exit 1
                  fi
                  echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              shell: bash

            - name: Create or update GitHub Release
              run: |
                  set -euo pipefail
                  tag="${{ steps.release_tag.outputs.tag }}"
                  if ! gh release view "${tag}" >/dev/null 2>&1; then
                      gh release create "${tag}" \
                          --title "Wave 简体中文增强版 ${tag}" \
                          --notes "自动构建的 macOS arm64 和 Windows x64 安装包。" \
                          --target "${GITHUB_SHA}"
                  fi
                  mapfile -t files < <(find release-artifacts -type f | sort)
                  if [[ ${#files[@]} -eq 0 ]]; then
                      echo "No release artifacts found" >&2
                      exit 1
                  fi
                  gh release upload "${tag}" "${files[@]}" --clobber
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
